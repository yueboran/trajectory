name: starmap

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: starmap_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      # 挂载数据库文件以实现持久化（注意：生产环境最好挂载整个 db 目录或使用 Postgres）
      - ./backend/jixiang.db:/app/jixiang.db
    networks:
      - starmap_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: starmap_frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - starmap_network

networks:
  starmap_network:
    driver: bridge
